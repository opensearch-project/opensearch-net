name: Compile

on: [pull_request, push]

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.?sproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Compile
      run: |
        dotnet build
