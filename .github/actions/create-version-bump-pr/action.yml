name: Create Version Bump Pull Request

inputs:
  branch:
    description: 'Branch to bump version on'
    required: true
    type: string
  version:
    description: 'Version to bump to'
    required: true
    type: string
  token:
    description: 'GitHub Token'
    required: true
    type: string

runs:
  using: 'composite'
  steps:
    - name: Checkout ${{ inputs.branch }}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ inputs.branch }}
        path: client

    - name: Bump Version To ${{ inputs.version }}
      shell: bash -eo pipefail {0}
      run: bash .github/bump-version.sh "$VERSION"
      working-directory: client
      env:
        VERSION: ${{ inputs.version }}

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
      with:
        token: ${{ inputs.token }}
        path: client
        base: ${{ inputs.branch }}
        branch: 'bump-version/${{ inputs.branch }}'
        commit-message: Bump version to ${{ inputs.version }}
        signoff: true
        delete-branch: true
        labels: |
          autocut
        title: '[AUTO] Bump version on `${{ inputs.branch }}` to `${{ inputs.version }}`'
        body: |
          Bumping version on `${{ inputs.branch }}` to `${{ inputs.version }}`.
